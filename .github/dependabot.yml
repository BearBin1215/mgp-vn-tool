version: 2
updates:
  # 后端依赖
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "monthly"
    groups:
      cargo:
        patterns:
          - "*"

  # 前端依赖
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      npm:
        patterns:
          - "*"
